<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="WhereIsIvan">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <clipPath id="shape">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!--
    "WiI"  –  Ubuntu Bold, horizontally centred.
    W and I are white; the lowercase i is #82B1FF (blue accent).
    font-family falls back through system sans-serif fonts.
  -->
  <text
    x="256"
    y="330"
    font-family="'Ubuntu', 'Liberation Sans', 'Helvetica Neue', Arial, sans-serif"
    font-size="268"
    font-weight="700"
    text-anchor="middle"
    letter-spacing="-4">
    <tspan fill="#FFFFFF">W</tspan><tspan fill="#82B1FF">i</tspan><tspan fill="#FFFFFF">I</tspan>
  </text>
</svg>
